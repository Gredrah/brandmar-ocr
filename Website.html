<!DOCTYPE html>
<html>
<head>
    <title>Receipt Scanner</title>
    <link rel="stylesheet" href="Website.css">
</head>
<body>

<div class="container">

    <h1>Scan Receipt</h1>

    <input type="file" id="receiptInput" accept="image/*" capture="environment" multiple>

    <p class="helper-text">Take a clear photo of your receipt</p>

    <div id="preview"></div>
    <button>Upload</button>
</div>
<script src="Website.js"></script>

</body>
</html>
