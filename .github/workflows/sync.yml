name: Sync with Upstream

# This determines when the action runs
on:
  schedule:
    - cron: '* * * * 1' # Runs every 1 minutes. Adjust as needed.
  workflow_dispatch: # Adds a button in the GitHub UI to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout local repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pulls the full history so the merge works

      - name: Add upstream remote
        run: git remote add upstream https://github.com/cjdegen29-commits/Webapp.git

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Merge upstream into local
        run: |
          # Configure the bot identity for the commit
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          
          # Merge the histories. '-X ours' ensures your custom code wins any merge conflicts.
          git merge upstream/main --allow-unrelated-histories -s recursive -X ours

          # NEW: Search and destroy wrangler.toml if the upstream repo tried to bring it back
          if [ -f "wrangler.toml" ]; then
            git rm -f wrangler.toml
            git commit -m "Auto-remove wrangler.toml to keep Cloudflare dashboard variables unlocked" || true
          fi
          
      - name: Push changes to your repo
        run: git push origin main